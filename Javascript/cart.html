<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div id="products" class="row"></div>
        <div id="cart" class="mt-5">
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <div id="cart-total" class="mt-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = [];

        function addToCart(productId, name, price) {
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ id: productId, name, price: parseFloat(price.replace('$', '')), quantity: 1 });
            }
            renderCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            renderCart();
        }

        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    renderCart();
                }
            }
        }

        function renderCart() {
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            cartItems.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.quantity;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'd-flex justify-content-between align-items-center mb-2';
                itemDiv.innerHTML = `
                    <span>${item.name} - $${item.price} x ${item.quantity}</span>
                    <div>
                        <button class="btn btn-sm btn-secondary" onclick="updateQuantity(${item.id}, -1)">-</button>
                        <button class="btn btn-sm btn-secondary" onclick="updateQuantity(${item.id}, 1)">+</button>
                        <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                `;
                cartItems.appendChild(itemDiv);
            });
            cartTotal.innerHTML = `<h4>Total: $${total.toFixed(2)}</h4>`;
        }

        // Generate 50 product cards
        const productsContainer = document.getElementById('products');
        for (let i = 1; i <= 50; i++) {
            const col = document.createElement('div');
            col.className = 'col-md-3 mb-4';

            const card = document.createElement('div');
            card.className = 'card h-100';

            const img = document.createElement('img');
            img.src = 'https://via.placeholder.com/150';
            img.className = 'card-img-top';
            img.alt = 'Product Image';

            const cardBody = document.createElement('div');
            cardBody.className = 'card-body d-flex flex-column';

            const title = document.createElement('h5');
            title.className = 'card-title';
            title.textContent = `Product ${i}`;

            const priceValue = Math.floor(Math.random() * 100) + 10;
            const price = document.createElement('p');
            price.className = 'card-text';
            price.textContent = `$${priceValue}`;

            const button = document.createElement('button');
            button.className = 'btn btn-primary mt-auto';
            button.textContent = 'Add to Cart';
            button.onclick = () => addToCart(i, `Product ${i}`, `$${priceValue}`);

            cardBody.appendChild(title);
            cardBody.appendChild(price);
            cardBody.appendChild(button);

            card.appendChild(img);
            card.appendChild(cardBody);

            col.appendChild(card);
            productsContainer.appendChild(col);
        }
    </script>
</body>
</html>
